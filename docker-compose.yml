version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - WHISPER_MODEL_SIZE=base
      - ECHO_CORS_ORIGINS=http://localhost:5173
    volumes:
      - echo_db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_ORIGIN=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  echo_db_data: